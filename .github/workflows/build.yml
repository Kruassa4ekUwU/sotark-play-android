name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Beta Debug APK
        run: ./gradlew assembleBetaDebug --no-daemon

      - name: Upload Beta Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sotark-play-beta-debug
          path: app/build/outputs/apk/beta/debug/app-beta-debug.apk
          retention-days: 30

      - name: Build Stable Debug APK
        run: ./gradlew assembleStableDebug --no-daemon

      - name: Upload Stable Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sotark-play-stable-debug
          path: app/build/outputs/apk/stable/debug/app-stable-debug.apk
          retention-days: 30

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/sotark-play.keystore

      - name: Build Stable Release APK
        run: ./gradlew assembleStableRelease --no-daemon
        env:
          KEYSTORE_PATH: sotark-play.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign Stable Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_stable
        with:
          releaseDirectory: app/build/outputs/apk/stable/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Stable Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sotark-play-stable-release-signed
          path: ${{ steps.sign_stable.outputs.signedReleaseFile }}
          retention-days: 30

      - name: Build Beta Release APK
        run: ./gradlew assembleBetaRelease --no-daemon
        env:
          KEYSTORE_PATH: sotark-play.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign Beta Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_beta
        with:
          releaseDirectory: app/build/outputs/apk/beta/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Beta Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sotark-play-beta-release-signed
          path: ${{ steps.sign_beta.outputs.signedReleaseFile }}
          retention-days: 30
